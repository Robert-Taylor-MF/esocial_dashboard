{% extends 'base.html' %}

{% block conteudo %}
    <header class="mb-8">
        <h2 class="text-3xl font-bold text-slate-100">Mural de Recompensas</h2>
        <p class="text-slate-400">Emita os Decretos (Faturas) para os membros da sua party.</p>
    </header>

    <div class="bg-slate-800 p-8 rounded-lg border border-slate-700 shadow-xl max-w-2xl">
        <h3 class="text-xl font-bold text-green-400 mb-6 border-b border-slate-700 pb-2">Forjar Fatura em PDF</h3>
        
        <form method="GET" action="{% url 'fatura_pdf' %}" target="_blank" class="space-y-6">
            
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Selecione o Aliado (Devedor)</label>
                <select name="pessoa_id" required class="w-full bg-slate-900 text-slate-300 border border-slate-600 rounded p-3 focus:border-green-500 outline-none">
                    <option value="">-- Selecione o membro --</option>
                    {% for p in pessoas %}
                        <option value="{{ p.id }}">{{ p.nome }} {% if p.telefone %}({{ p.telefone }}){% endif %}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Mês (Competência)</label>
                    <select name="mes" class="w-full bg-slate-900 text-slate-300 border border-slate-600 rounded p-3 focus:border-green-500 outline-none">
                        <option value="1" {% if mes_atual == '1' %}selected{% endif %}>Janeiro</option>
                        <option value="2" {% if mes_atual == '2' %}selected{% endif %}>Fevereiro</option>
                        <option value="3" {% if mes_atual == '3' %}selected{% endif %}>Março</option>
                        <option value="4" {% if mes_atual == '4' %}selected{% endif %}>Abril</option>
                        <option value="5" {% if mes_atual == '5' %}selected{% endif %}>Maio</option>
                        <option value="6" {% if mes_atual == '6' %}selected{% endif %}>Junho</option>
                        </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Ano</label>
                    <input type="number" name="ano" value="{{ ano_atual }}" class="w-full bg-slate-900 text-slate-300 border border-slate-600 rounded p-3 focus:border-green-500 outline-none">
                </div>
            </div>

            <button type="submit" class="w-full mt-4 px-6 py-3 bg-green-700 hover:bg-green-600 text-white font-bold rounded shadow-lg transition-all uppercase tracking-widest flex items-center justify-center gap-2">
                <i data-lucide="file-text" class="w-5 h-5"></i> Gerar Fatura
            </button>
        </form>
    </div>
{% endblock %}
