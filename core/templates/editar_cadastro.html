{% extends 'base.html' %}

{% block conteudo %}
    <header class="mb-8">
        <h2 class="text-3xl font-bold text-slate-100 flex items-center gap-3">
            <i data-lucide="wrench" class="text-blue-500 w-8 h-8"></i> Forja de Transmutação
        </h2>
        <p class="text-slate-400">Modifique os atributos do seu registro de <strong class="text-blue-400">{{ nome_entidade }}</strong>.</p>
    </header>

    <div class="bg-slate-800 p-8 rounded-lg border border-slate-700 shadow-xl max-w-2xl">
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            {{ form.as_p }}

            <div class="mt-8 flex justify-end gap-4 border-t border-slate-700 pt-6">
                <a href="{% url 'central_cadastros' %}" class="px-6 py-2 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded flex items-center gap-2 transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Cancelar / Voltar
                </a>
                <button type="submit" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded shadow-lg flex items-center gap-2 transition-colors">
                    <i data-lucide="save" class="w-4 h-4"></i> Guardar Alterações
                </button>
            </div>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            lucide.createIcons();
        });
    </script>
{% endblock %}
