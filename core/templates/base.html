<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForjaDev - RPG Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex">
    
    <div style="display: none;">
        {% csrf_token %}
    </div>

    <aside class="w-64 bg-slate-800 border-r border-slate-700 flex flex-col shadow-2xl z-10 hidden md:flex">
        <div class="p-6 border-b border-slate-700 flex items-center gap-3">
            <i data-lucide="shield" class="text-red-600 w-8 h-8"></i>
            <h1 class="text-2xl font-black tracking-tighter text-slate-100 uppercase">Forja<span class="text-red-600">Dev</span></h1>
        </div>
        
        <nav class="flex-1 p-4 space-y-2">
            <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-slate-300 hover:bg-slate-700 hover:text-white transition-colors font-medium">
                <i data-lucide="layout-dashboard" class="w-5 h-5 text-slate-400"></i> Visão Geral
            </a>
            <a href="{% url 'extrato_faturas' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-slate-300 hover:bg-slate-700 hover:text-white transition-colors font-medium">
                <i data-lucide="scroll-text" class="w-5 h-5 text-slate-400"></i> Pergaminhos (Extrato)
            </a>
            <a href="{% url 'importar_fatura' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-slate-300 hover:bg-slate-700 hover:text-white transition-colors font-medium">
                <i data-lucide="cpu" class="w-5 h-5 text-purple-400"></i> O Oráculo (IA)
            </a>
            <a href="{% url 'sala_de_guerra' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-slate-300 hover:bg-slate-700 hover:text-white transition-colors font-medium">
                <i data-lucide="pie-chart" class="w-5 h-5 text-yellow-500"></i> Sala de Guerra
            </a>
            <a href="{% url 'mural_cobrancas' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-slate-300 hover:bg-slate-700 hover:text-green-400 transition-colors font-medium">
                <i data-lucide="swords" class="w-5 h-5 text-green-500"></i> Caçada (Cobranças)
            </a>
            <a href="{% url 'banco_guilda' %}" class="flex items-center gap-3 px-4 py-3 rounded-md text-slate-300 hover:bg-slate-700 hover:text-emerald-400 transition-colors font-medium border-l-2 border-transparent hover:border-emerald-500">
                <i data-lucide="landmark" class="w-5 h-5 text-emerald-500"></i> Banco da Guilda
            </a>
        </nav>
        
        <div class="p-4 border-t border-slate-700">
            <a href="{% url 'central_cadastros' %}" class="flex items-center justify-center gap-2 w-full px-4 py-2 bg-slate-900 border border-slate-600 text-slate-300 rounded-md hover:bg-slate-700 hover:border-slate-500 transition-colors text-sm uppercase tracking-wide font-bold shadow-inner">
                <i data-lucide="settings" class="w-4 h-4"></i> Quartel-General
            </a>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        {% block conteudo %}
        {% endblock %}

        <form method="POST" action="{% url 'logout' %}" class="fixed bottom-8 right-10 z-50">
            {% csrf_token %}
            <button type="submit" class="group bg-slate-900 border border-slate-700 hover:border-red-500 hover:bg-red-950/80 text-slate-500 hover:text-red-400 w-12 h-12 rounded-full flex items-center justify-center shadow-lg transition-all hover:scale-110 hover:shadow-[0_0_20px_rgba(220,38,38,0.6)] relative">
                
                <i data-lucide="door-open" class="w-5 h-5 transition-transform group-hover:-translate-x-0.5"></i>
                
                <span class="absolute right-16 top-1/2 -translate-y-1/2 bg-slate-950 text-red-400 text-[10px] font-bold px-3 py-1.5 rounded border border-red-900 opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pointer-events-none tracking-widest uppercase">
                    Abandonar Forja
                </span>
                
            </button>
        </form>
    </main>

    <script>
        // 1. INICIALIZAÇÃO BLINDADA DOS ÍCONES LUCIDE
        // Aguarda o HTML carregar 100% antes de tentar desenhar os SVGs
        document.addEventListener("DOMContentLoaded", function() {
            lucide.createIcons();
        });

        // 2. BUSCA DO TOKEN DE SEGURANÇA CSRF
        function obterTokenCSRF() {
            const inputCsrf = document.querySelector('[name=csrfmiddlewaretoken]');
            if (inputCsrf) return inputCsrf.value;
            
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, 10) === ('csrftoken=')) {
                        cookieValue = decodeURIComponent(cookie.substring(10));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // 3. API DE ATUALIZAÇÃO DE CATEGORIA
        function salvarCategoria(transacaoId, categoriaId) {
            const token = obterTokenCSRF();
            fetch(`/api/atualizar-categoria/${transacaoId}/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': token },
                body: JSON.stringify({ categoria_id: categoriaId })
            }).then(response => {
                if (response.ok) window.location.reload(); 
                else alert('Erro na Forja! O servidor bloqueou a classificação da categoria.');
            }).catch(erro => alert('Falha de conexão ao salvar a categoria.'));
        }

        // 4. API DE ATUALIZAÇÃO DE RESPONSÁVEL
        function salvarResponsavel(transacaoId, pessoaId) {
            const token = obterTokenCSRF();
            fetch(`/api/atualizar-responsavel/${transacaoId}/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': token },
                body: JSON.stringify({ pessoa_id: pessoaId })
            }).then(response => {
                if (response.ok) window.location.reload(); 
                else alert('Erro na Forja! O servidor bloqueou a alteração do responsável.');
            }).catch(erro => alert('Falha de conexão ao salvar o responsável.'));
        }

        // 5. API DE DESTRUIÇÃO (LIXEIRA)
        function deletarTransacao(transacaoId) {
            if(confirm("Tem certeza que deseja obliterar este registro? Esta ação não pode ser desfeita.")) {
                const token = obterTokenCSRF();
                fetch(`/api/deletar-transacao/${transacaoId}/`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': token }
                }).then(response => {
                    if (response.ok) {
                        window.location.reload(); 
                    } else {
                        alert('O feitiço falhou! O servidor protegeu o registro.');
                    }
                }).catch(erro => alert('Falha de conexão com a Forja.'));
            }
        }
    </script>
</body>
</html>
