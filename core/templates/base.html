<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Uma fonte mais sóbria e imersiva */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex">

    <aside class="w-64 bg-slate-950 border-r border-slate-800 flex flex-col">
        <div class="p-6 border-b border-slate-800">
            <h1 class="text-2xl font-bold text-red-500 tracking-wider uppercase">Nexus<span class="text-slate-100">Fin</span></h1>
            <p class="text-xs text-slate-500 mt-1">Gestão de Recursos</p>
        </div>

        <nav class="flex-1 p-4 space-y-2">
            <a href="{% url 'dashboard' %}" class="block px-4 py-3 rounded-md bg-slate-800 text-slate-100 hover:bg-slate-700 hover:text-red-400 transition-colors">
                Visão Geral
            </a>
            
            <a href="{% url 'importar_fatura' %}" class="block px-4 py-3 rounded-md text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors">
                Importar via IA
            </a>

            <a href="{% url 'extrato_faturas' %}" class="block px-4 py-3 rounded-md text-slate-400 hover:bg-slate-800 hover:text-slate-100 transition-colors">
                Histórico de faturas
            </a>
               
        </nav>

        <div class="p-4 border-t border-slate-800">
            <a href="{% url 'gerenciar_cartoes' %}" target="_blank" class="block w-full text-center px-4 py-2 bg-red-900/30 border border-red-900 text-red-400 rounded-md hover:bg-red-900/50 transition-colors text-sm uppercase tracking-wide font-semibold">
                Cadastros
            </a>
            <a href="/admin/" target="_blank" class="block w-full text-center px-4 py-2 bg-slate-900 border border-slate-700 text-slate-400 rounded-md hover:bg-slate-800 hover:text-purple-400 hover:border-purple-900/50 transition-all text-xs uppercase tracking-wider">
                Painel Django (Admin)
            </a>
            <p class="text-[10px] text-slate-500 text-center mt-2">Pessoas, Cartões e Categorias</p>
        </div>
    </aside>

    <main class="flex-1 p-8">
        {% block conteudo %}
        {% endblock %}
    </main>

</body>

<script>
    // Função universal para ler Cookies (Padrão ouro do Django)
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function salvarCategoria(transacaoId, categoriaId) {
        // Agora pegamos o token limpo diretamente do navegador
        const csrftoken = getCookie('csrftoken');

        fetch(`/api/atualizar-categoria/${transacaoId}/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrftoken
            },
            body: JSON.stringify({ categoria_id: categoriaId })
        })
        .then(response => {
            if (response.ok) {
                console.log(`Transação ${transacaoId} reclassificada no banco de dados!`);
            } else {
                alert('O servidor bloqueou a requisição. Verifique o terminal do Django.');
            }
        })
        .catch(error => {
            console.error("Falha na rede:", error);
            alert('Erro de comunicação com o Backend.');
        });
    }
</script>
</body>
</html>

</html>
