{% extends 'base.html' %}

{% block conteudo %}
    <header class="mb-8">
        <h2 class="text-3xl font-bold text-slate-100">Forja de Dados (Extrator PDF)</h2>
        <p class="text-slate-400">Faça o upload da fatura e deixe a IA trabalhar.</p>
    </header>

    {% if messages %}
        <div class="mb-6">
            {% for message in messages %}
                <div class="p-4 rounded-md {% if message.tags == 'success' %}bg-green-900/50 text-green-400 border border-green-800{% else %}bg-red-900/50 text-red-400 border border-red-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <div class="bg-slate-800 p-6 rounded-lg border border-slate-700 max-w-xl">
        <form method="POST" action="{% url 'importar_fatura' %}" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-slate-300 text-sm font-bold mb-2">Qual é o Cartão desta Fatura?</label>
                <select name="cartao_id" required class="w-full bg-slate-900 text-slate-200 border border-slate-700 rounded-md p-3 focus:outline-none focus:border-red-500">
                    <option value="" disabled selected>Selecione uma arma (Cartão)...</option>
                    {% for cartao in cartoes %}
                        <option value="{{ cartao.id }}">{{ cartao.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-slate-300 text-sm font-bold mb-2">Mês da Fatura</label>
                    <select name="mes_fatura" required class="w-full bg-slate-900 text-slate-200 border border-slate-700 rounded-md p-3 focus:outline-none focus:border-red-500">
                        <option value="1">Janeiro</option>
                        <option value="2">Fevereiro</option>
                        <option value="3">Março</option>
                        <option value="4">Abril</option>
                        </select>
                </div>
                <div>
                    <label class="block text-slate-300 text-sm font-bold mb-2">Ano</label>
                    <input type="number" name="ano_fatura" value="2026" required class="w-full bg-slate-900 text-slate-200 border border-slate-700 rounded-md p-3 focus:outline-none focus:border-red-500">
                </div>
            </div>

            <div>
                <label class="block text-slate-300 text-sm font-bold mb-2">Arquivo da Fatura (.pdf)</label>
                <input type="file" name="fatura_pdf" accept="application/pdf" required class="w-full bg-slate-900 text-slate-200 border border-slate-700 rounded-md p-2 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-slate-700 file:text-slate-300 hover:file:bg-slate-600 cursor-pointer">
            </div>
            
            <button type="submit" class="w-full mt-4 px-6 py-3 bg-red-600 hover:bg-red-700 text-white font-bold rounded shadow-lg shadow-red-500/30 transition-all">
                Processar PDF e Extrair Transações
            </button>
        </form>
    </div>
{% endblock %}
